<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Japa Tracker</title>

    <!-- iOS Home Screen App Icon (Self-contained SVG data URL) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23d97706'/><circle cx='90' cy='90' r='52' fill='none' stroke='%23ffffff' stroke-width='6' stroke-dasharray='16 10'/><circle cx='90' cy='38' r='10' fill='%23fffbeb'/><circle cx='90' cy='90' r='24' fill='%23b45309'/><path d='M83,90 L97,90 M90,83 L90,97' stroke='%23fffbeb' stroke-width='4' stroke-linecap='round'/></svg>">

    <!-- iOS "Web App" Mode: Removes the Safari URL/search bars when launched from Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Japa">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fdfbf7;
            color: #2c2c2e;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Prevents weird text selection highlights when rapid tapping on iOS */
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(139, 92, 26, 0.08);
            box-sizing: border-box;
            border: 1px solid #f3ebe1;
            margin-top: env(safe-area-inset-top); /* Pads correctly for iPhone Notch/Island */
        }
        h2 { 
            text-align: center; 
            margin-top: 0; 
            color: #d97706; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: #fffbeb;
            border: 1px solid #fde68a;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-val {
            font-size: 28px;
            font-weight: bold;
            color: #b45309;
        }
        .stat-lbl {
            font-size: 12px;
            color: #78350f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .chant-pad {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, #f59e0b 0%, #d97706 100%);
            color: white;
            border-radius: 50%;
            margin: 0 auto 24px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 16px rgba(217, 119, 6, 0.3);
            cursor: pointer;
            transition: transform 0.05s ease;
            /* Eliminates the grey tap overlay rectangle standard to iOS Safari clickable elements */
            -webkit-tap-highlight-color: transparent; 
        }
        .chant-pad:active {
            transform: scale(0.95);
            background: radial-gradient(circle, #d97706 0%, #b45309 100%);
        }
        .chant-pad span { font-size: 14px; opacity: 0.9; }
        .chant-pad strong { font-size: 24px; margin-top: 4px; }

        .manual-entry {
            border-top: 1px dashed #e5e7eb;
            padding-top: 20px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 8px;
        }
        input[type="number"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            background: #fafafa;
            -webkit-user-select: text; /* Ensures input stays typeable */
            user-select: text;
        }
        .btn {
            background: #4b5563;
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-log { background: #d97706; }
        .btn-log:active { background: #b45309; }

        .history {
            margin-top: 10px;
            max-height: 160px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: 14px;
        }
        .item-date { color: #6b7280; }
        .item-count { color: #1f2937; font-weight: 500; }
        .clear-btn {
            display: block;
            width: 100%;
            background: none;
            color: #9ca3af;
            font-size: 12px;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .clear-btn:hover { color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h2>📿 Japa Tracker</h2>
    
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-val" id="totalChants">0</div>
            <div class="stat-lbl">Total Chants</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="totalRounds">0.0</div>
            <div class="stat-lbl">Rounds (108)</div>
        </div>
    </div>

    <div class="chant-pad" onclick="tapChant()">
        <span>Tap to Chant</span>
        <strong id="sessionCounter">0</strong>
    </div>

    <div class="manual-entry">
        <div class="input-group">
            <input type="number" id="numInput" placeholder="Bulk add chants..." inputmode="numeric">
            <button class="btn btn-log" onclick="logManual()">Add</button>
        </div>
    </div>

    <h3 style="font-size: 14px; color: #4b5563; margin-bottom: 8px;">History</h3>
    <div class="history" id="historyLog"></div>
    
    <button class="clear-btn" onclick="clearData()">Reset Device Data</button>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('japaLogs')) || [];
    let currentSessionCount = 0;
    let saveTimeout = null;

    function updateUI() {
        const totalChants = logs.reduce((sum, item) => sum + item.value, 0);
        const rounds = (totalChants / 108).toFixed(1);

        document.getElementById('totalChants').textContent = totalChants.toLocaleString();
        document.getElementById('totalRounds').textContent = rounds;

        const logContainer = document.getElementById('historyLog');
        logContainer.innerHTML = '';
        
        const dailySummary = {};
        logs.forEach(item => {
            dailySummary[item.date] = (dailySummary[item.date] || 0) + item.value;
        });

        Object.keys(dailySummary).reverse().forEach(date => {
            const div = document.createElement('div');
            div.className = 'history-item';
            const dayRounds = (dailySummary[date] / 108).toFixed(1);
            div.innerHTML = `
                <span class="item-date">${date}</span> 
                <span class="item-count">${dailySummary[date]} (${dayRounds} Rnds)</span>
            `;
            logContainer.appendChild(div);
        });
    }

    function tapChant() {
        currentSessionCount++;
        document.getElementById('sessionCounter').textContent = currentSessionCount;

        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            commitChants(currentSessionCount);
            currentSessionCount = 0;
            document.getElementById('sessionCounter').textContent = '0';
        }, 1500);
    }

    function logManual() {
        const input = document.getElementById('numInput');
        const val = parseInt(input.value);
        if (isNaN(val) || val <= 0) return;

        commitChants(val);
        input.value = '';
    }

    function commitChants(count) {
        const entry = {
            date: new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }),
            value: count
        };
        logs.push(entry);
        localStorage.setItem('japaLogs', JSON.stringify(logs));
        updateUI();
    }

    function clearData() {
        if (confirm("Are you sure you want to completely reset your chant history?")) {
            logs = [];
            localStorage.removeItem('japaLogs');
            updateUI();
        }
    }

    updateUI();
</script>

</body>
</html>
